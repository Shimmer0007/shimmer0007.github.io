name: Deploy ShimmerOS to GitHub Pages

on:
  # 监听 main 分支的 push 提交
  push:
    branches: [ main ]
  # 允许手动触发部署
  workflow_dispatch:

# 设置 GitHub 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同一时间只有一个部署工作流运行
concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Website
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
